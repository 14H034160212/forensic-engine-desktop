name: Build installers (Tauri)

# Produces real installers (.dmg / .msi / .nsis / .AppImage / .deb) by wrapping the PyInstaller
# binary as a Tauri sidecar, and on a v* tag publishes them to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  installers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r forensic_app/requirements-laptop.txt pyinstaller

      - name: Build PyInstaller binary (non-Windows)
        if: runner.os != 'Windows'
        run: bash forensic_app/desktop/build.sh

      - name: Build PyInstaller binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: forensic_app\desktop\build.bat

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: forensic_app/desktop/tauri/src-tauri

      - name: Linux system deps (webkit2gtk etc.)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf

      - name: Install Tauri CLI (prebuilt, no compile)
        uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y tauri-cli

      - name: Place sidecar binary (target-triple name)
        working-directory: forensic_app/desktop/tauri
        run: |
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          mkdir -p src-tauri/binaries
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp ../../../desktop_dist/ForensicEngine.exe "src-tauri/binaries/engine-server-${TRIPLE}.exe"
          else
            cp ../../../desktop_dist/ForensicEngine "src-tauri/binaries/engine-server-${TRIPLE}"
            chmod +x "src-tauri/binaries/engine-server-${TRIPLE}"
          fi
          echo "sidecar: engine-server-${TRIPLE}"

      - name: Generate icons
        working-directory: forensic_app/desktop/tauri
        run: cargo tauri icon src-tauri/icon-source.png

      - name: Build installer
        working-directory: forensic_app/desktop/tauri
        run: |
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          rustup target add "$TRIPLE" || true
          # pin the build target to the host so it matches the sidecar name we placed
          cargo tauri build --target "$TRIPLE"

      - name: Upload installers (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            forensic_app/desktop/tauri/src-tauri/target/**/release/bundle/**/*.dmg
            forensic_app/desktop/tauri/src-tauri/target/**/release/bundle/**/*.msi
            forensic_app/desktop/tauri/src-tauri/target/**/release/bundle/**/*.exe
            forensic_app/desktop/tauri/src-tauri/target/**/release/bundle/**/*.AppImage
            forensic_app/desktop/tauri/src-tauri/target/**/release/bundle/**/*.deb
          if-no-files-found: warn

  # Publish all installers to a GitHub Release when a v* tag is pushed → a stable download page.
  release:
    needs: installers
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
